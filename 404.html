<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – Industrial Fans India</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .error-page {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,196,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,196,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .error-content { position: relative; z-index: 1; padding: 2rem; }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(8rem, 20vw, 16rem);
      color: rgba(255,255,255,0.05);
      line-height: 1;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
    }
    .error-icon { font-size: 4rem; color: var(--orange); margin-bottom: 1.5rem; }
    .error-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); color: var(--white); margin-bottom: 1rem; }
    .error-msg { color: rgba(255,255,255,0.55); font-size: 1.05rem; margin-bottom: 2.5rem; max-width: 480px; margin-left: auto; margin-right: auto; }
    .error-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .spinner {
      width: 60px; height: 60px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.svg">
</head>
<body>
  <div class="error-page">
    <div class="error-code" aria-hidden="true">404</div>
    <div class="error-content">
      <div class="spinner" aria-hidden="true"></div>
      <p class="section-eyebrow" style="justify-content:center;color:var(--orange-lt)">Error 404</p>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-msg">The page you're looking for doesn't exist or may have been moved. Let us help you find what you need.</p>
      <div class="error-links">
        <a href="/index.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Back to Home</a>
        <a href="/pages/products.html" class="btn btn-outline btn-lg"><i class="fas fa-th"></i> View Products</a>
        <a href="/pages/contact.html" class="btn btn-outline btn-lg"><i class="fas fa-phone"></i> Contact Us</a>
      </div>
      <div style="margin-top:3rem;display:flex;gap:2rem;justify-content:center;flex-wrap:wrap">
        <a href="/pages/products/centrifugal-fans.html" style="color:rgba(255,255,255,0.4);font-size:0.82rem;transition:color 0.3s" onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">Centrifugal Fans</a>
        <a href="/pages/products/guillotine-dampers.html" style="color:rgba(255,255,255,0.4);font-size:0.82rem;transition:color 0.3s" onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">Guillotine Dampers</a>
        <a href="/pages/products/goggle-valves.html" style="color:rgba(255,255,255,0.4);font-size:0.82rem;transition:color 0.3s" onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">Goggle Valves</a>
        <a href="/pages/about.html" style="color:rgba(255,255,255,0.4);font-size:0.82rem;transition:color 0.3s" onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">About Us</a>
        <a href="/pages/contact.html" style="color:rgba(255,255,255,0.4);font-size:0.82rem;transition:color 0.3s" onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">Contact</a>
      </div>
    </div>
  </div>
</body>
</html>
