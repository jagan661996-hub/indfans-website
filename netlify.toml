# Netlify configuration for Industrial Fans India website
# Deploy: drag-drop the indfans/ folder at netlify.com/drop

[build]
  publish = "."

# Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Disposition = "attachment"

# Redirects
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/products"
  to = "/pages/products.html"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/pages/contact.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/pages/about.html"
  status = 301

# 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
